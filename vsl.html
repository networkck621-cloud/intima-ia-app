<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>Intima IA – Preparando seu Diagnóstico</title>
    <link rel="stylesheet" href="/src/style.css" />
</head>
<body>
    <div class="app">
        <header class="app-header vsl-header-compact">
            <div class="logo">Intima<span>IA</span></div>
        </header>
        
        <main class="screen screen-centered" id="vsl-root">
            <div class="vsl-video-wrap">
        <iframe
          id="vsl-video"
          src="https://www.youtube.com/embed/HLq_dKNb3gE?enablejsapi=1&autoplay=1&mute=1&playsinline=1&controls=0&modestbranding=1&rel=0&showinfo=0&iv_load_policy=3&disablekb=1&fs=0&loop=1&playlist=HLq_dKNb3gE"
          title="Intima IA"
          frameborder="0"
          allow="autoplay; encrypted-media"
        ></iframe>
        <!-- Camada de bloqueio + toque-para-ouvir: fica por cima do iframe,
             absorve o clique (impede redirecionar pro YouTube) e, no primeiro
             toque, desmuta o player via YouTube IFrame API sem reiniciar o
             vídeo. pointer-events fica no padrão (auto) de propósito — "none"
             deixaria o clique atravessar pro iframe em vez de bloquear. -->
        <div class="vsl-video-block" id="vsl-unmute-layer">
          <span class="vsl-unmute-hint" id="vsl-unmute-hint">🔊 Toque para ouvir</span>
        </div>
      </div>

      <div class="vsl-progress-wrap">
        <div class="progress-bar">
          <div class="progress-fill" id="vsl-progress-fill" style="width: 0%;"></div>
        </div>
        <span class="vsl-progress-label" id="vsl-progress-label">0%</span>
      </div>

      <h1 class="title" id="vsl-headline" style="font-size: 20px;"></h1>
      <p class="subtitle" id="vsl-subtitle"></p>

      <!-- TODO: substituir pelos links reais de "Sobre nós" e "Termos de Uso" -->
      <div class="profile-footer-links">
        <a href="#" class="footer-link">Sobre nós</a>
        <span class="footer-link-sep">•</span>
        <a href="#" class="footer-link">Termos de Uso</a>
      </div>
    </main>
  </div>

 <script src="state.js"></script>
<script src="content.js"></script>
<script src="https://www.youtube.com/iframe_api"></script>
<script src="vsl.js"></script>
</body>
</html>
