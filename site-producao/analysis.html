<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Intima IA — Analisando seu perfil</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <header class="app-header">
      <div class="logo">Intima<span>IA</span></div>
    </header>

    <main class="screen screen-centered" id="analysis-root">
      <div class="analysis-loading" id="loading-stage">
        <div class="analysis-bar-wrap">
          <div class="analysis-bar-fill" id="bar-fill"></div>
        </div>
        <p class="subtitle" id="loading-message">Analisando seu perfil para traçar o melhor plano de ação...</p>
      </div>
    </main>
  </div>

  <script src="state.js"></script>
  <script src="content.js"></script>
  <script src="analysis.js"></script>
</body>
</html>
