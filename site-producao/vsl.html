<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Intima IA — Preparando seu Diagnóstico</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <header class="app-header">
      <div class="logo">Intima<span>IA</span></div>
    </header>

    <main class="screen screen-centered" id="vsl-root">
      <div class="vsl-video-wrap">
        <iframe
          id="vsl-video"
          src="https://www.youtube-nocookie.com/embed/HLq_dKNb3gE?controls=1&modestbranding=1&rel=0&disablekb=1&autoplay=1&mute=1&playsinline=1&iv_load_policy=3"
          title="Intima IA"
          frameborder="0"
          allow="autoplay; encrypted-media; picture-in-picture"
          allowfullscreen
        ></iframe>
        <!-- Camada de bloqueio: fica por cima do iframe e absorve o clique,
             impedindo o redirecionamento pro YouTube. pointer-events precisa
             ficar "auto" (padrão) aqui — "none" deixaria o clique atravessar
             pro iframe em vez de bloquear. -->
        <div class="vsl-video-block" aria-hidden="true"></div>
      </div>

      <h1 class="title" id="vsl-headline" style="font-size: 20px;"></h1>
      <p class="subtitle" id="vsl-subtitle"></p>

      <div class="vsl-progress-wrap">
        <div class="progress-bar">
          <div class="progress-fill" id="vsl-progress-fill" style="width: 0%;"></div>
        </div>
        <span class="vsl-progress-label" id="vsl-progress-label">0%</span>
      </div>
    </main>
  </div>

  <script src="state.js"></script>
  <script src="content.js"></script>
  <script src="vsl.js"></script>
</body>
</html>
